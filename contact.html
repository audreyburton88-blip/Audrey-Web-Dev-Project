<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Contact Me</title>

    <!-- Font Awesome -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700,800" rel="stylesheet">

    <!-- CSS -->
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light" id="mainNav">
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand" href="index.html">Start Bootstrap</a>
    </div>
</nav>

<!-- Header -->
<header class="masthead" style="background-image: url('assets/img/connect.jpg')">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7 text-center">
                <div class="page-heading">
                    <h1>Let’s Connect</h1>
                    <span class="subheading">I’d love to hear from you.</span>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- Contact Section -->
<main class="mb-5">
    <div class="container px-4 px-lg-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7 text-center">

                <p class="mb-5">Feel free to reach out anytime!</p>

                <div class="card shadow-sm p-4">

                    <h3 class="mb-4">Contact Information</h3>

                    <p>
                        <strong>Name:</strong><br>
                        [YOUR NAME HERE]
                    </p>

                    <p>
                        <strong>Email:</strong><br>
                        [YOUR EMAIL HERE]
                    </p>

                    <p>
                        <strong>Phone:</strong><br>
                        [YOUR PHONE NUMBER HERE]
                    </p>

                    <p>
                        <strong>Location:</strong><br>
                        [CITY, STATE]
                    </p>

                    <p>
                        <strong>Instagram / Social:</strong><br>
                        <a href="#">[YOUR LINK HERE]</a>
                    </p>

                </div>

            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="border-top">
    <div class="container text-center py-4">
        <div class="small text-muted fst-italic">
            © Your Website
        </div>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
